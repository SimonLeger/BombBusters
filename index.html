<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Khygon's BombBusters - Authentication</title>
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Khygon's BombBusters Logo" class="logo">
    </header>
    <main>
        <form action="" id="form-login" class="forms">
            <h2>Login</h2>
            <div class="form-group">
                <input class="form-input" type="text" id="username" name="username" required placeholder="Username">
            </div>
            <div class="form-group">
                <input class="form-input" type="password" id="password" name="password" required placeholder="Password">
            </div>
            <div class="form-group">
                <button class="login" type="submit" onclick="">Login</button>
            </div>
            <a class="quicklink" href="">No account? Register now!</a>
        </form>

        <form action="" id="form-register" class="forms" style="display: none;">
            <h2>Register</h2>
            <div class="form-group">
                <input class="form-input" type="text" id="username" name="username" required placeholder="Username">
            </div>
            <div class="form-group">
                <input class="form-input" type="password" id="password" name="password" required placeholder="Password">
            </div>
            <div class="form-group">
                <button class="login" type="submit" onclick="">Create</button>
            </div>
            <a class="quicklink" href="">Already have an account? Login here!</a>
        </form>

    </main>
    <footer>
        <div>Created by Simon Leger in 2026 while unemployed</div>
    </footer>
</body>
</html>
